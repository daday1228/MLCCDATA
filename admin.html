<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원료 ID 관리 — GreenSheet Lab</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
/* CSS Variable 초기화 */
:root {
  --bg: #faf8f3; --surface: #ffffff; --surface-muted: #f3f1ea;
  --border: #e6e3d8; --text-primary: #1a1f2e; --text-secondary: #5a6478;
  --accent: #2d6a4f; --accent-hover: #1b4332; --danger: #b3341f;
  --font-body: 'Pretendard Variable', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }
body { background: var(--bg); color: var(--text-primary); font-size: 14px; }

/* Admin Auth Overlay */
#auth-overlay {
  position: fixed; inset: 0; background: rgba(26,31,46,0.9);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.auth-box {
  background: var(--surface); padding: 32px; border-radius: 12px;
  width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center;
}
.auth-box h2 { margin-bottom: 20px; font-size: 18px; color: var(--accent); }
.auth-box input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 6px; text-align: center; letter-spacing: 4px; }
.auth-box button { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

.header { background: var(--surface); padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.main { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 350px 1fr; gap: 24px; padding: 0 20px; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.input, .select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
.input[readonly] { background: var(--surface-muted); color: var(--text-secondary); cursor: not-allowed; }
.btn { padding: 10px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }
.btn-danger { background: var(--danger); padding: 6px 12px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; margin-top: 16px; }
th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
th { background: var(--surface-muted); font-size: 12px; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h2>System Admin Authentication</h2>
    <input type="password" id="admin-pw" placeholder="비밀번호 입력">
    <button onclick="verifyAuth()">인증</button>
  </div>
</div>

<header class="header">
  <h2>GreenSheet Lab <span style="font-size:12px;color:#b45309;">ADMIN</span></h2>
  <a href="index.html" class="btn" style="text-decoration:none;">메인 뷰 복귀</a>
</header>

<main class="main">
  <div class="section">
    <h3 style="margin-bottom:20px;">원료 등록 패널</h3>
    <div class="field">
      <label>원료명</label>
      <select class="select" id="mat-name" onchange="generateId()">
        <option value="">— 선택 —</option>
        <option value="유전체">유전체 (BT)</option>
        <option value="내부전극 Metal">내부전극 Metal (MT)</option>
        <option value="내부전극 BT 공재">내부전극 BT 공재 (VD)</option>
        <option value="외부전극">외부전극 (NI)</option>
      </select>
    </div>
    <div class="field">
      <label>공급 받은 날짜</label>
      <input class="input" type="date" id="mat-date" onchange="generateId()">
    </div>
    <div class="field">
      <label>입도 (nm)</label>
      <input class="input" type="number" id="mat-size" placeholder="예: 100" oninput="generateId()">
    </div>
    <div class="field">
      <label>원료 ID (자동 생성)</label>
      <input class="input" type="text" id="mat-id" readonly placeholder="파라미터 입력 시 자동 생성">
    </div>
    <button class="btn" style="width:100%" onclick="registerMaterial()">데이터 베이스 등록</button>
  </div>

  <div class="section">
    <h3>등록 원료 목록</h3>
    <table>
      <thead><tr><th>원료 ID</th><th>원료명</th><th>공급일</th><th>입도(nm)</th><th>삭제</th></tr></thead>
      <tbody id="mat-tbody"></tbody>
    </table>
  </div>
</main>

<script>
// Authentication Logic
function verifyAuth() {
  if(document.getElementById('admin-pw').value === '0405') {
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    alert('Invalid Authentication Key.');
  }
}
document.getElementById('admin-pw').addEventListener('keypress', function(e) { if(e.key === 'Enter') verifyAuth(); });

// Local Storage IO
const LS_KEY = 'mlcc.materials';
function loadMaterials() { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
function saveMaterials(arr) { localStorage.setItem(LS_KEY, JSON.stringify(arr)); }

// Auto ID Generation Logic
function generateId() {
  const name = document.getElementById('mat-name').value;
  const dateStr = document.getElementById('mat-date').value;
  const size = document.getElementById('mat-size').value;

  const prefixMap = { '유전체': 'BT', '내부전극 Metal': 'MT', '내부전극 BT 공재': 'VD', '외부전극': 'NI' };
  let prefix = prefixMap[name] || '';
  
  let formattedDate = '';
  if (dateStr) {
    const d = new Date(dateStr);
    const yy = String(d.getFullYear()).slice(2);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    formattedDate = `${yy}${mm}${dd}`;
  }

  const suffix = size ? `${size}NM` : '';

  if (prefix && formattedDate && suffix) {
    document.getElementById('mat-id').value = `${prefix}-${formattedDate}-${suffix}`;
  } else {
    document.getElementById('mat-id').value = '';
  }
}

// Registration Module
function registerMaterial() {
  const id = document.getElementById('mat-id').value;
  const name = document.getElementById('mat-name').value;
  const date = document.getElementById('mat-date').value;
  const size = document.getElementById('mat-size').value;

  if(!id) return alert('모든 파라미터를 입력하여 ID를 생성하십시오.');

  const materials = loadMaterials();
  if(materials.some(m => m.id === id)) return alert('식별자 충돌(ID 중복)이 발생했습니다.');

  materials.push({ id, name, supply_date: date, particle_size_nm: Number(size), registered_at: new Date().toISOString() });
  saveMaterials(materials);
  
  document.getElementById('mat-name').value = '';
  document.getElementById('mat-date').value = '';
  document.getElementById('mat-size').value = '';
  document.getElementById('mat-id').value = '';
  
  renderList();
}

function deleteMaterial(id) {
  if(confirm(`[Warning] ${id} 데이터를 메모리에서 제거하시겠습니까?`)) {
    saveMaterials(loadMaterials().filter(m => m.id !== id));
    renderList();
  }
}

function renderList() {
  const tbody = document.getElementById('mat-tbody');
  const materials = loadMaterials().sort((a,b) => b.registered_at.localeCompare(a.registered_at));
  tbody.innerHTML = materials.map(m => `
    <tr>
      <td><strong>${m.id}</strong></td>
      <td>${m.name}</td>
      <td>${m.supply_date}</td>
      <td>${m.particle_size_nm}</td>
      <td><button class="btn-danger" onclick="deleteMaterial('${m.id}')">Drop</button></td>
    </tr>
  `).join('');
}

document.getElementById('mat-date').valueAsDate = new Date();
renderList();
</script>
</body>
</html>
