:root {
  --bg: #faf8f3; --surface: #ffffff; --surface-muted: #f3f1ea;

  --text-primary: #1a1f2e; --text-secondary: #5a6478; --text-muted: #8a92a5;

* { box-sizing: border-box; margin: 0; padding: 0; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 40px; }

.admin-badge { display: inline-block; padding: 2px 8px; background: var(--warning); color: white; font-size: 10px; font-weight: 600; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase; margin-left: 8px; vertical-align: middle; }
.btn { font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); cursor: pointer; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }

.btn-danger { color: var(--danger); border-color: transparent; background: transparent; }
.btn-danger:hover { background: rgba(179,52,31,0.08); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }
.page-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.6px; margin-bottom: 6px; }
.page-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }

.section-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.field-group { display: flex; flex-direction: column; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
