:root {
  --bg: #faf8f3; --surface: #ffffff; --surface-muted: #f3f1ea;
  --border: #e6e3d8; --border-strong: #d4d0c2;
  --text-primary: #1a1f2e; --text-secondary: #5a6478; --text-muted: #8a92a5;
  --accent: #2d6a4f; --accent-hover: #1b4332; --accent-light: #d8f3dc; --accent-soft: #f0f8f3;
  --danger: #b3341f; --warning: #b45309; --info: #1d4ed8;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-body); font-size: 14px; line-height: 1.55; color: var(--text-primary); background: var(--bg); -webkit-font-smoothing: antialiased; }
body { background-image: radial-gradient(circle at 20% 0%, rgba(45,106,79,0.04) 0%, transparent 50%), radial-gradient(circle at 80% 100%, rgba(180,83,9,0.03) 0%, transparent 50%); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 40px; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 32px; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { width: 44px; height: 44px; background: var(--accent); color: white; border-radius: 8px; display: grid; place-items: center; font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.5px; box-shadow: 0 2px 8px rgba(45,106,79,0.25); }
.brand-text h1 { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.6px; line-height: 1.1; color: var(--text-primary); }
